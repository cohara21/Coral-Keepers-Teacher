<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coral Keepers - Courses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #faf9f8;
      --text-dark: #2f3333;
      --text-muted: #5b605f;
      --blue: #0075de;
      --green: #2ecc71;
      --inactive: #989898;
      --card-border: rgba(0, 0, 0, 0.1);
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text-dark);
      font-family: "Inter", sans-serif;
    }

    html {
      overflow-y: scroll;
    }

    body {
      overflow-x: hidden;
    }

    .top-nav {
      position: fixed;
      z-index: 30;
      left: 0;
      right: 0;
      top: 0;
      height: 64px;
      backdrop-filter: blur(6px);
      background: rgba(255, 255, 255, 0.95);
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      display: flex;
      justify-content: center;
    }

    .top-nav-inner {
      width: min(1328px, calc(100% - 48px));
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 100%;
    }

    .brand {
      width: 239px;
      height: 36.716px;
      display: block;
      object-fit: contain;
    }

    .nav-links {
      display: flex;
      gap: 4px;
      align-items: stretch;
      height: 48px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      line-height: 16px;
      border-bottom: 2px solid transparent;
      text-decoration: none;
    }

    .nav-link.active {
      color: var(--blue);
      font-weight: 700;
      border-bottom-color: var(--blue);
      padding-bottom: 2px;
    }

    .nav-link.switch {
      margin-left: auto;
      width: 190px;
      justify-content: flex-end;
      gap: 8px;
      padding-right: 16px;
    }

    .switch-icon {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      flex: none;
    }

    .learn-page {
      position: relative;
      padding-top: 65px;
      min-height: 100vh;
    }

    .learn-shell {
      position: relative;
      width: 1280px;
      height: 757.265px;
      margin: 0 auto;
    }

    .hero-banner {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      width: 100vw;
      height: 309px;
      overflow: hidden;
    }

    .hero-banner img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .hero-avatar {
      position: absolute;
      left: 539px;
      top: 205px;
      width: 201px;
      height: 201px;
      z-index: 2;
    }

    .hero-avatar img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      border-radius: 50%;
    }

    .course-title {
      position: absolute;
      left: 0;
      right: 0;
      top: 443.5px;
      transform: translateY(-50%);
      margin: 0;
      text-align: center;
      color: #000000;
      font-size: 24px;
      line-height: 20.106px;
      font-weight: 500;
      white-space: nowrap;
    }

    .courses {
      position: absolute;
      left: 0;
      top: 481px;
      width: 1280px;
      height: 276.265px;
    }

    .course-card {
      position: absolute;
      width: 393.146px;
      height: 276.265px;
      background: #ffffff;
      border: 0.664px solid var(--card-border);
      border-radius: 5.313px;
      box-shadow: var(--shadow);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
    }

    a.course-card {
      cursor: pointer;
    }

    a.course-card:hover,
    a.course-card:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.35);
      filter: brightness(1.05);
    }

    a.course-card:active {
      transform: translateY(0);
    }

    .course-card:nth-child(1) {
      left: 32px;
    }

    .course-card:nth-child(2) {
      left: 443px;
    }

    .course-card:nth-child(3) {
      left: 854px;
    }

    .course-card-header {
      position: absolute;
      left: 15.94px;
      right: 15.94px;
      top: 15.94px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 2;
    }

    .course-code {
      color: var(--text-muted);
      font-size: 12px;
      line-height: 10.626px;
      font-weight: 700;
      letter-spacing: 0.7969px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .course-status {
      font-size: 12px;
      line-height: 10.626px;
      font-weight: 700;
      letter-spacing: 0.7969px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .course-status.active {
      color: var(--green);
    }

    .course-status.inactive {
      color: var(--inactive);
    }

    .course-image {
      position: absolute;
      left: -0.66px;
      top: 37.34px;
      width: 393px;
      height: 168px;
      overflow: hidden;
    }

    .course-image img {
      position: absolute;
      display: block;
      max-width: none;
      object-fit: cover;
    }

    .course-card:nth-child(1) .course-image img {
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .course-card:nth-child(2) .course-image img {
      left: 0;
      top: -42.02%;
      width: 136.98%;
      height: 213.73%;
    }

    .course-card:nth-child(3) .course-image {
      background: #d9d9d9;
    }

    .course-card:nth-child(3) .course-image img {
      left: 0;
      top: -37.46%;
      width: 100%;
      height: 175.45%;
    }

    .course-name {
      position: absolute;
      left: 16.34px;
      top: 242.34px;
      transform: translateY(-50%);
      margin: 0;
      color: var(--text-dark);
      font-size: 20px;
      line-height: 13.282px;
      font-weight: 500;
      white-space: nowrap;
    }

    .floating-ai {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 73px;
      height: 73px;
      border-radius: 46.063px;
      border: 3px solid #0075de;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 4px rgba(0, 0, 0, 0.11);
      z-index: 40;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
    }

    .floating-ai:hover,
    .floating-ai:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.35);
      filter: brightness(1.05);
    }

    .floating-ai:active {
      transform: translateY(0);
    }

    .floating-ai img {
      width: 32.287px;
      height: 48.156px;
      display: block;
    }

    .cory-popup {
      position: fixed;
      right: 20px;
      bottom: 108px;
      width: 331px;
      height: 310px;
      background: #ffffff;
      overflow: hidden;
      z-index: 45;
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    .cory-popup[aria-hidden="true"] {
      display: none;
    }

    .cory-header {
      height: 65px;
      background: #005eb4;
      position: relative;
    }

    .cory-avatar-wrap {
      position: absolute;
      left: 16px;
      top: 14px;
      width: 38px;
      height: 38px;
      border: 1.562px solid #0075de;
      border-radius: 23.978px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2.082px 2.082px rgba(0, 0, 0, 0.11);
      padding: 1.562px;
    }

    .cory-avatar-wrap img {
      width: 16.807px;
      height: 25.068px;
      display: block;
    }

    .cory-name {
      position: absolute;
      left: 66px;
      top: 25px;
      margin: 0;
      color: #ffffff;
      font-size: 13px;
      line-height: 16px;
      font-weight: 700;
    }

    .cory-online {
      position: absolute;
      right: 16px;
      top: 29px;
      width: 8px;
      height: 8px;
      border-radius: 12px;
      background: #4ade80;
    }

    .cory-body {
      position: relative;
      height: 192px;
      background: #ffffff;
    }

    .cory-bubble {
      position: absolute;
      left: 57px;
      top: 122px;
      width: 254.403px;
      height: 56.635px;
      background: url("../assets/454e7403-cab5-45cc-8610-78726ea10732.svg") no-repeat center / contain;
      display: flex;
      align-items: center;
      padding-left: 17px;
    }

    .cory-bubble p {
      margin: 0;
      font-size: 12px;
      line-height: 19.5px;
      color: #000000;
      font-weight: 400;
      white-space: nowrap;
    }

    .cory-input-row {
      height: 53px;
      border-top: 1px solid rgba(0, 0, 0, 0.05);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 13px 12px 12px;
      background: #ffffff;
    }

    .cory-input {
      flex: 1;
      height: 28px;
      border: none;
      border-radius: 2px;
      background: #f3f4f2;
      padding: 8px 12px 9px;
      font-family: "Inter", sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: #111827;
      outline: none;
    }

    .cory-input::placeholder {
      color: #6b7280;
      opacity: 1;
    }

    .cory-send {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 2px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
    }

    .cory-send:hover,
    .cory-send:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.35);
      filter: brightness(1.05);
    }

    .cory-send:active {
      transform: translateY(0);
    }

    .cory-send img {
      width: 14.25px;
      height: 12px;
      display: block;
    }

    @media (max-width: 1280px) {
      .top-nav-inner {
        padding: 0 12px;
      }

      .nav-links {
        display: none;
      }

      .learn-shell {
        width: 100%;
        height: auto;
        min-height: 900px;
      }

      .hero-banner {
        width: 100%;
      }

      .courses {
        position: relative;
        top: 481px;
        width: calc(100% - 24px);
        margin: 0 12px;
      }

      .course-card {
        position: relative;
        left: auto !important;
        top: auto;
        width: 100%;
        margin-bottom: 16px;
      }
    }
  </style>
</head>
<body>
  <header class="top-nav">
    <div class="top-nav-inner">
      <a class="brand-link" href="index.html" aria-label="Go to teacher home"><img class="brand" src="../assets/252d1942-dc4e-47ac-a946-f47357213f7a.svg" alt="Coral Keepers" /></a>
      <nav class="nav-links" aria-label="Primary">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link active" href="learn.html">Courses</a>
        <a class="nav-link" href="announcements.html">Announcements</a>
        <a class="nav-link" href="calendar.html">Calendar</a>
        <a class="nav-link" href="messages.html">Messages</a>
        <a class="nav-link switch" href="../Student/index.html">
          <span>Student View</span>
          <span class="switch-icon" aria-hidden="true">
            <img src="../assets/teacher-switch.svg" alt="" width="16" height="16" />
          </span>
        </a>
      </nav>
    </div>
  </header>

  <main class="learn-page">
    <section class="learn-shell">
      <div class="hero-banner">
        <img src="https://www.figma.com/api/mcp/asset/498c51dc-4280-4654-a2c1-692efdd39987" alt="Coral reef" />
      </div>

      <div class="hero-avatar">
        <img src="https://www.figma.com/api/mcp/asset/0747ba07-fc5c-4b18-ba74-589ba3549b0d" alt="Mr. Smith" />
      </div>

      <h1 class="course-title">Mr. Smith's Courses</h1>

      <section class="courses" aria-label="Courses">
        <a class="course-card" href="course.html" aria-label="Introduction to Marine Biology">
          <div class="course-card-header">
            <span class="course-code">MAR BIO 101</span>
            <span class="course-status active">ACTIVE</span>
          </div>
          <div class="course-image">
            <img src="https://www.figma.com/api/mcp/asset/6752fed3-215b-49eb-91cb-38841e727be2" alt="Introduction to Marine Biology" />
          </div>
          <h2 class="course-name">Introduction to Marine Biology</h2>
        </a>

        <article class="course-card" aria-label="Exploring Marine Ecosystems">
          <div class="course-card-header">
            <span class="course-code">MAR BIO 201</span>
            <span class="course-status active">ACTIVE</span>
          </div>
          <div class="course-image">
            <img src="https://www.figma.com/api/mcp/asset/41efb633-5430-4520-9862-aafe7670bb26" alt="Exploring Marine Ecosystems" />
          </div>
          <h2 class="course-name">Exploring Marine Ecosystems</h2>
        </article>

        <article class="course-card" aria-label="Coral Science">
          <div class="course-card-header">
            <span class="course-code">MAR BIO 348</span>
            <span class="course-status inactive">INACTIVE</span>
          </div>
          <div class="course-image">
            <img src="https://www.figma.com/api/mcp/asset/0eddab46-40b3-4278-8f54-27bfe0491460" alt="Coral Science" />
          </div>
          <h2 class="course-name">Coral Science</h2>
        </article>
      </section>
    </section>
  </main>

  <button class="floating-ai" aria-label="Cory AI">
    <img src="../assets/e59ca79e-5989-44bd-ae7d-d21a7a8e0641.svg" alt="" />
  </button>

  <div class="cory-popup" id="coryPopup" role="dialog" aria-label="Cory chat" aria-hidden="true">
    <div class="cory-header">
      <div class="cory-avatar-wrap">
        <img src="../assets/9e494c12-c6a7-45f9-91ac-f474512b6048.svg" alt="" />
      </div>
      <p class="cory-name">Cory</p>
      <span class="cory-online"></span>
    </div>
    <div class="cory-body">
      <div class="cory-bubble">
        <p>Have my pH levels been consistent?</p>
      </div>
    </div>
    <div class="cory-input-row">
      <input class="cory-input" type="text" placeholder="Type a message..." />
      <button class="cory-send" type="button" aria-label="Send">
        <img src="../assets/bb543680-485a-4fa9-b5ed-481596dd53fd.svg" alt="" />
      </button>
    </div>
  </div>

  <script>
    const coryToggle = document.querySelector('.floating-ai');
    const coryPopup = document.getElementById('coryPopup');

    function setPopupOpen(open) {
      coryPopup.setAttribute('aria-hidden', open ? 'false' : 'true');
    }

    coryToggle.addEventListener('click', () => {
      const isOpen = coryPopup.getAttribute('aria-hidden') === 'false';
      setPopupOpen(!isOpen);
    });

    document.addEventListener('click', (event) => {
      if (coryPopup.getAttribute('aria-hidden') === 'true') {
        return;
      }

      if (!coryPopup.contains(event.target) && !coryToggle.contains(event.target)) {
        setPopupOpen(false);
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        setPopupOpen(false);
      }
    });
  </script>
</body>
</html>
