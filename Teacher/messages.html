<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coral Keepers - Teacher Messages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #faf9f8;
      --text-dark: #2f3333;
      --text-muted: #5b605f;
      --blue: #0075de;
      --card-border: rgba(0, 0, 0, 0.1);
      --divider: rgba(0, 0, 0, 0.05);
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    html {
      overflow-y: scroll;
      scrollbar-gutter: stable;
    }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .top-nav {
      position: fixed;
      z-index: 30;
      left: 0;
      right: 0;
      top: 0;
      height: 64px;
      backdrop-filter: blur(6px);
      background: rgba(255, 255, 255, 0.95);
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      display: flex;
      justify-content: center;
    }

    .top-nav-inner {
      width: min(1328px, calc(100% - 48px));
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 100%;
    }

    .brand {
      width: 239px;
      height: 36.716px;
      object-fit: contain;
      display: block;
    }

    .nav-links {
      display: flex;
      gap: 4px;
      align-items: stretch;
      height: 48px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      line-height: 16px;
      border-bottom: 2px solid transparent;
      text-decoration: none;
    }

    .nav-link.switch {
      gap: 8px;
      margin-left: auto;
      width: 190px;
      justify-content: flex-end;
      padding-right: 16px;
    }

    .switch-icon {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      flex: none;
    }

    .nav-link.active {
      color: var(--blue);
      font-weight: 700;
      border-bottom-color: var(--blue);
      padding-bottom: 2px;
    }

    .page {
      width: min(1280px, 100%);
      margin: 0 auto;
      padding: 81px 48px 81px;
    }

    .board-shell {
      width: min(1183px, calc(100% - 48px));
      margin: 0 auto;
      position: relative;
    }

    .page-tools {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }

    .page-tools img {
      width: 57px;
      height: 20px;
      object-fit: contain;
      display: block;
      opacity: 0.88;
    }

    .board {
      min-height: clamp(620px, calc(100vh - 220px), 740px);
      width: 100%;
      background: #fff;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      position: relative;
      padding: 24px 24px 32px;
    }

    .section-title {
      margin: 0;
      font-size: 12px;
      line-height: 16px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 700;
      color: var(--text-muted);
    }

    .message-list {
      margin-top: 10px;
    }

    .message-row {
      appearance: none;
      -webkit-appearance: none;
      font: inherit;
      width: 100%;
      text-align: left;
      min-height: 62px;
      border-bottom: 1px solid var(--divider);
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) 150px;
      align-items: center;
      gap: 18px;
      padding: 10px 0;
      text-decoration: none;
      border-radius: 0;
      background: transparent;
      border-left: none;
      border-right: none;
      border-top: none;
    }

    .thumb {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      overflow: hidden;
      flex: none;
      background: #eef2f7;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .message-code {
      margin: 0 0 2px;
      font-size: 12px;
      line-height: 16px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      font-weight: 400;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .message-title {
      margin: 0;
      font-size: 18px;
      line-height: 20px;
      font-weight: 500;
      color: var(--text-dark);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .new-message {
      border: none;
      background: transparent;
      padding: 0;
      justify-self: end;
      color: var(--blue);
      font-size: 14px;
      line-height: 20px;
      font-weight: 400;
      text-decoration: none;
      white-space: nowrap;
      cursor: pointer;
      font-family: "Inter", sans-serif;
      text-align: right;
    }

    .new-message:focus-visible,
    .compose-close:focus-visible,
    .send-btn:focus-visible,
    .segment-btn:focus-visible,
    .close-btn:focus-visible,
    .target-select:focus-visible,
    .message-input:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 2px;
    }

    .new-message[hidden] {
      display: none;
    }

    .compose-panel {
      position: absolute;
      left: 14px;
      right: 14px;
      top: 180px;
      bottom: 20px;
      border-radius: 0 0 8px 8px;
      background: #f8f8f8;
      border-top: 2px solid #2190ff;
      padding: 18px 14px 18px;
      display: none;
      overflow: hidden;
    }

    .board.is-compose {
      min-height: clamp(620px, calc(100vh - 140px), 760px);
    }

    .board.is-compose .compose-panel {
      display: block;
    }

    .compose-close {
      position: absolute;
      right: 10px;
      top: 8px;
      width: 20px;
      height: 20px;
      border: none;
      border-radius: 50%;
      color: #2190ff;
      background: transparent;
      font-size: 24px;
      line-height: 16px;
      cursor: pointer;
      padding: 0;
    }

    .compose-form {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 20px;
    }

    .target-row {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: start;
      column-gap: 8px;
      padding-top: 12px;
    }

    .target-label {
      font-size: 14px;
      line-height: 20px;
      font-weight: 500;
      color: #2f3333;
      padding-top: 4px;
    }

    .target-content {
      display: grid;
      gap: 12px;
    }

    .segmented {
      display: inline-flex;
      align-items: center;
      border: 1px solid #d4d4d4;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      width: fit-content;
    }

    .segment-btn {
      height: 34px;
      padding: 0 14px;
      border: none;
      background: #fff;
      color: var(--text-muted);
      font-family: "Inter", sans-serif;
      font-size: 12px;
      line-height: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
    }

    .segment-btn.active {
      background: var(--blue);
      color: #fff;
    }

    .target-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field-label {
      font-size: 12px;
      line-height: 16px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 700;
    }

    .target-select,
    .message-input {
      width: 100%;
      border: 1px solid #d4d4d4;
      border-radius: 8px;
      background: #fff;
      padding: 10px 12px;
      font-family: "Inter", sans-serif;
      font-size: 14px;
      line-height: 20px;
      color: #2f3333;
      outline: none;
    }

    .message-input {
      min-height: 170px;
      resize: none;
      color: #2f3333;
    }

    .message-input::placeholder,
    .target-select:invalid {
      color: #8e8e8e;
      opacity: 1;
    }

    .compose-actions {
      display: flex;
      justify-content: flex-end;
    }

    .send-btn {
      width: 82px;
      height: 32px;
      border: none;
      border-radius: 8px;
      background: #0075de;
      color: #fff;
      font-size: 14px;
      line-height: 20px;
      font-weight: 600;
      font-family: "Inter", sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .send-btn:disabled {
      opacity: 0.55;
      cursor: default;
    }

    .send-btn .plane {
      width: 12px;
      height: 12px;
      display: block;
    }

    .sent-state {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 26px;
      background: #f8f8f8;
    }

    .compose-panel.is-sent .compose-form {
      display: none;
    }

    .compose-panel.is-sent .sent-state {
      display: flex;
    }

    .sent-icon {
      width: 147px;
      height: 147px;
      border-radius: 50%;
      background: #0075de;
      position: relative;
    }

    .sent-icon::after {
      content: "";
      position: absolute;
      left: 47px;
      top: 41px;
      width: 45px;
      height: 26px;
      border-left: 7px solid #fff;
      border-bottom: 7px solid #fff;
      transform: rotate(-45deg);
      border-radius: 3px;
    }

    .sent-text {
      margin: 0;
      font-size: 30px;
      line-height: 20px;
      color: #000;
      font-weight: 500;
    }

    .floating-ai {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 73px;
      height: 73px;
      border-radius: 46.063px;
      border: none;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
      z-index: 40;
      cursor: pointer;
      padding: 0;
    }

    .floating-ai img {
      width: 100%;
      height: 100%;
      display: block;
    }

    @media (max-width: 1280px) {
      .top-nav-inner {
        width: 100%;
        padding: 0 12px;
      }

      .page {
        padding-left: 12px;
        padding-right: 12px;
      }

      .board {
        width: 100%;
      }

      .nav-links {
        display: none;
      }

      .board-shell {
        width: calc(100% - 24px);
      }

      .target-grid {
        grid-template-columns: 1fr;
      }
    }

    .cory-popup {
      position: fixed;
      right: 20px;
      bottom: 108px;
      width: 331px;
      height: 310px;
      background: #ffffff;
      overflow: visible;
      z-index: 45;
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    .cory-popup[aria-hidden="true"] {
      display: none;
    }

    .cory-header {
      height: 65px;
      background: #005eb4;
      position: relative;
    }

    .cory-avatar {
      position: absolute;
      left: 16px;
      top: 14px;
      width: 38px;
      height: 38px;
      border: 1.562px solid #0075de;
      border-radius: 23.978px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2.082px 2.082px rgba(0, 0, 0, 0.11);
      padding: 1.562px;
    }

    .cory-avatar img {
      width: 16.807px;
      height: 25.068px;
      display: block;
    }

    .cory-name {
      position: absolute;
      left: 66px;
      top: 25px;
      margin: 0;
      color: #ffffff;
      font-size: 13px;
      line-height: 16px;
      font-weight: 700;
    }

    .cory-close {
      position: absolute;
      right: 10px;
      top: 20px;
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: #ffffff;
      font-family: "Inter", sans-serif;
      font-size: 24px;
      line-height: 1;
      font-weight: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      z-index: 2;
    }

    .cory-pointer {
      position: absolute;
      right: 30px;
      bottom: -7px;
      width: 14px;
      height: 14px;
      background: #ffffff;
      transform: rotate(45deg);
      border-right: 1px solid rgba(0, 0, 0, 0.08);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      z-index: 1;
      pointer-events: none;
    }

    .cory-body {
      position: relative;
      height: 192px;
      background: #ffffff;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    .cory-bubble {
      width: fit-content;
      max-width: 254px;
      min-height: auto;
      border-radius: 10px;
      background: #f3f6ff;
      border: 1px solid #dbe7ff;
      display: flex;
      align-items: flex-start;
      padding: 10px 14px;
      align-self: flex-start;
    }

    .cory-bubble.user {
      background: #0075de;
      border-color: #0075de;
      align-self: flex-end;
    }

    .cory-bubble.typing {
      opacity: 0.85;
    }

    .cory-bubble p {
      margin: 0;
      font-size: 12px;
      line-height: 16px;
      color: #000000;
      font-weight: 400;
      white-space: normal;
    }

    .cory-bubble.user p {
      color: #ffffff;
    }

    .cory-input-row {
      height: 53px;
      border-top: 1px solid rgba(0, 0, 0, 0.05);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 13px 12px 12px;
      background: #ffffff;
    }

    .cory-input {
      flex: 1;
      height: 28px;
      border: none;
      border-radius: 2px;
      background: #f3f4f2;
      padding: 8px 12px 9px;
      font-family: "Inter", sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: #111827;
      outline: none;
    }

    .cory-input::placeholder {
      color: #6b7280;
      opacity: 1;
    }

    .cory-send {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 2px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      cursor: pointer;
    }

    .cory-send img {
      width: 14.25px;
      height: 12px;
      display: block;
    }
    }
  </style>
</head>
<body>
  <header class="top-nav">
    <div class="top-nav-inner">
      <a class="brand-link" href="index.html" aria-label="Go to teacher home"><img class="brand" src="../assets/252d1942-dc4e-47ac-a946-f47357213f7a.svg" alt="Coral Keepers" /></a>
      <nav class="nav-links" aria-label="Primary">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="course.html">Courses</a>
        <a class="nav-link" href="announcements.html">Announcements</a>
        <a class="nav-link" href="calendar.html">Calendar</a>
        <a class="nav-link active" href="messages.html">Messages</a>
        <a class="nav-link switch" href="../Student/index.html">
          <span>Student View</span>
          <span class="switch-icon" aria-hidden="true">
            <img src="../assets/teacher-switch.svg" alt="" width="16" height="16" />
          </span>
        </a>
      </nav>
    </div>
  </header>

  <main class="page">
    <section class="board-shell">
      <div class="page-tools" aria-hidden="true">
        <img src="../assets/1d7cd1d6-caff-46b9-aa10-55553fe7209d.svg" alt="" />
      </div>

      <section class="board" id="board">
        <h1 class="section-title">Messages</h1>

        <div class="message-list" id="messageList">
          <button class="message-row new-message-trigger" type="button" data-class-code="MAR BIO 101" data-class-name="Introduction to Marine Biology">
            <div class="thumb"><img src="../assets/teacher-message-thumb-101.jpg" alt="" /></div>
            <div>
              <p class="message-code">MAR BIO 101</p>
              <p class="message-title">Introduction to Marine Biology</p>
            </div>
            <span class="new-message">New Message</span>
          </button>

          <button class="message-row new-message-trigger" type="button" data-class-code="MAR BIO 201" data-class-name="Exploring Marine Ecosystems">
            <div class="thumb"><img src="../assets/teacher-message-thumb-201.jpg" alt="" /></div>
            <div>
              <p class="message-code">MAR BIO 201</p>
              <p class="message-title">Exploring Marine Ecosystems</p>
            </div>
            <span class="new-message">New Message</span>
          </button>

          <button class="message-row new-message-trigger" type="button" data-class-code="MAR BIO 348" data-class-name="Coral Science">
            <div class="thumb"><img src="../assets/teacher-message-thumb-348.jpg" alt="" /></div>
            <div>
              <p class="message-code">MAR BIO 348</p>
              <p class="message-title">Coral Science</p>
            </div>
            <span class="new-message">New Message</span>
          </button>
        </div>

        <section class="compose-panel" id="composePanel" aria-hidden="true">
          <button class="compose-close" type="button" aria-label="Close compose">×</button>

          <form class="compose-form" id="composeForm">
            <div class="target-row">
              <div class="target-label">To:</div>
              <div class="target-content">
                <div class="segmented" role="tablist" aria-label="Message target type">
                  <button class="segment-btn active" id="entireClassBtn" type="button" data-mode="class">Entire Class</button>
                  <button class="segment-btn" id="oneStudentBtn" type="button" data-mode="student">One Student</button>
                </div>

                <div class="target-grid">
                  <div class="field">
                    <label class="field-label" for="classSelect">Class</label>
                    <select class="target-select" id="classSelect" required>
                      <option value="" disabled selected>Select a class</option>
                      <option value="MAR BIO 101">MAR BIO 101 - Introduction to Marine Biology</option>
                      <option value="MAR BIO 201">MAR BIO 201 - Exploring Marine Ecosystems</option>
                      <option value="MAR BIO 348">MAR BIO 348 - Coral Science</option>
                    </select>
                  </div>

                  <div class="field" id="studentField">
                    <label class="field-label" for="studentSelect">Student</label>
                    <select class="target-select" id="studentSelect">
                      <option value="" disabled selected>Select a student</option>
                    </select>
                  </div>
                </div>
              </div>
            </div>

            <textarea class="message-input" id="messageInput" placeholder="Type here..." required></textarea>

            <div class="compose-actions">
              <button class="send-btn" id="sendBtn" type="submit" disabled>
                <img class="plane" src="../assets/bb543680-485a-4fa9-b5ed-481596dd53fd.svg" alt="" />
                Send
              </button>
            </div>
          </form>

          <div class="sent-state" aria-live="polite">
            <div class="sent-icon" aria-hidden="true"></div>
            <p class="sent-text">Message Sent!</p>
          </div>
        </section>
      </section>
    </section>
  </main>

  <button class="floating-ai" aria-label="Cory AI">
    <img src="../assets/corychaticon.svg" alt="" />
  </button>

  <div class="cory-popup" id="coryPopup" role="dialog" aria-label="Cory chat" aria-hidden="true">
    <div class="cory-pointer" aria-hidden="true"></div>
    <button class="cory-close" type="button" aria-label="Close Cory chat">×</button>
    <div class="cory-header">
      <div class="cory-avatar">
        <img src="../assets/9e494c12-c6a7-45f9-91ac-f474512b6048.svg" alt="" />
      </div>
      <p class="cory-name">Cory</p>
    </div>
    <div class="cory-body">
    </div>
    <div class="cory-input-row">
      <input class="cory-input" type="text" placeholder="Type a message..." />
      <button class="cory-send" type="button" aria-label="Send">
        <img src="../assets/bb543680-485a-4fa9-b5ed-481596dd53fd.svg" alt="" />
      </button>
    </div>
  </div>

  <script>
    const board = document.getElementById('board');
    const messageList = document.getElementById('messageList');
    const composePanel = document.getElementById('composePanel');
    const composeClose = document.querySelector('.compose-close');
    const composeForm = document.getElementById('composeForm');
    const classSelect = document.getElementById('classSelect');
    const studentSelect = document.getElementById('studentSelect');
    const studentField = document.getElementById('studentField');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const modeButtons = document.querySelectorAll('.segment-btn');
    const newMessageTriggers = document.querySelectorAll('.new-message-trigger');
    const coryToggle = document.querySelector('.floating-ai');
    const coryPopup = document.getElementById('coryPopup');
    const coryBody = coryPopup ? coryPopup.querySelector('.cory-body') : null;
    const coryInput = coryPopup ? coryPopup.querySelector('.cory-input') : null;
    const corySend = coryPopup ? coryPopup.querySelector('.cory-send') : null;
    const coryClose = coryPopup ? coryPopup.querySelector('.cory-close') : null;
    const isTeacherView = window.location.pathname.includes('/Teacher/');

    const classStudents = {
      'MAR BIO 101': [
        'Jessica Flores',
        'Michael Chen',
        'Aisha Patel'
      ],
      'MAR BIO 201': [
        'Ian Breen',
        'Emilio Hernandez',
        'Ariana Lopez'
      ],
      'MAR BIO 348': [
        'Maya Torres',
        'Noah Kim',
        'Sofia Grant'
      ]
    };

    let composeMode = 'class';
    let sentTimer = null;

    function setComposerOpen(open) {
      board.classList.toggle('is-compose', open);
      composePanel.setAttribute('aria-hidden', open ? 'false' : 'true');
      composePanel.classList.remove('is-sent');

      if (open) {
        messageInput.focus();
      }
    }

    function setMode(mode) {
      composeMode = mode;
      modeButtons.forEach((button) => {
        const active = button.dataset.mode === mode;
        button.classList.toggle('active', active);
      });

      studentField.style.display = mode === 'student' ? 'grid' : 'none';
      studentSelect.required = mode === 'student';
      if (mode !== 'student') {
        studentSelect.value = '';
      }
      updateSendState();
    }

    function populateStudents(classCode) {
      const students = classStudents[classCode] || [];
      studentSelect.innerHTML = '<option value="" disabled selected>Select a student</option>' + students.map((student) => `<option value="${student}">${student}</option>`).join('');
    }

    function openCompose(classCode) {
      setComposerOpen(true);
      if (classCode) {
        classSelect.value = classCode;
        populateStudents(classCode);
      }
      setMode('class');
    }

    function closeCompose() {
      setComposerOpen(false);
      composeForm.reset();
      classSelect.value = '';
      studentSelect.innerHTML = '<option value="" disabled selected>Select a student</option>';
      studentField.style.display = 'grid';
      setMode('class');
      updateSendState();
      if (sentTimer) {
        clearTimeout(sentTimer);
        sentTimer = null;
      }
    }

    function updateSendState() {
      const classChosen = classSelect.value.trim().length > 0;
      const studentChosen = composeMode === 'student' ? studentSelect.value.trim().length > 0 : true;
      const hasMessage = messageInput.value.trim().length > 0;
      sendBtn.disabled = !(classChosen && studentChosen && hasMessage);
    }

    newMessageTriggers.forEach((trigger) => {
      trigger.addEventListener('click', () => {
        openCompose(trigger.dataset.classCode);
      });
    });

    composeClose.addEventListener('click', closeCompose);

    modeButtons.forEach((button) => {
      button.addEventListener('click', () => setMode(button.dataset.mode));
    });

    classSelect.addEventListener('change', () => {
      populateStudents(classSelect.value);
      updateSendState();
    });

    studentSelect.addEventListener('change', updateSendState);
    messageInput.addEventListener('input', updateSendState);

    composeForm.addEventListener('submit', (event) => {
      event.preventDefault();
      if (sendBtn.disabled) {
        return;
      }

      composePanel.classList.add('is-sent');
      sentTimer = setTimeout(() => {
        closeCompose();
      }, 2500);
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && composePanel.getAttribute('aria-hidden') === 'false') {
        closeCompose();
      }
    });

    function scrollCoryToLatest() {
      if (coryBody) {
        coryBody.scrollTop = coryBody.scrollHeight;
      }
    }

    function appendCoryBubble(message, role = 'bot', isTyping = false) {
      if (!coryBody) {
        return null;
      }

      const bubble = document.createElement('div');
      bubble.className = `cory-bubble${role === 'user' ? ' user' : ''}${isTyping ? ' typing' : ''}`;

      const text = document.createElement('p');
      text.textContent = message;
      bubble.appendChild(text);

      coryBody.appendChild(bubble);
      scrollCoryToLatest();
      return bubble;
    }

    function getCoryReply(userMessage) {
      const message = userMessage.toLowerCase();

      if (/(hi|hello|hey)/.test(message)) {
        return 'Hey! I am Cory. Ask me about coral health, tank care, or where to find tools in this app.';
      }

      if (message.includes('ph')) {
        return 'For most reef tanks, pH is healthiest around 8.1 to 8.4. Big swings are more stressful than small day-to-day changes.';
      }

      if (message.includes('temperature') || message.includes('temp')) {
        return 'Coral systems usually do best around 76 to 80 degrees F. Keep temperature steady and avoid fast spikes.';
      }

      if (message.includes('salinity')) {
        return 'Target salinity near 35 ppt. Stability matters the most, so adjust slowly if you need to correct it.';
      }

      if (message.includes('message') || message.includes('chat')) {
        return 'You can use Messages to communicate with your class team. I can also help summarize what to ask or post.';
      }

      if (message.includes('calendar')) {
        return 'Use the Calendar to switch between Month and Day views, then click a date in Day view to jump directly to that day.';
      }

      if (message.includes('course') || message.includes('learn') || message.includes('assignment')) {
        return isTeacherView ? 'In Teacher view, open Courses to manage lessons and due dates. Use Post Reading for reading prompts and follow-up tasks.' : 'In Student view, open Learn to check assignments and due dates, then track progress from your dashboard.';
      }

      return 'I can help with coral care or app navigation. Try asking about pH, salinity, temperature, Calendar, Messages, or Learn/Courses.';
    }

    function handleCorySend() {
      if (!coryInput) {
        return;
      }

      const userMessage = coryInput.value.trim();
      if (!userMessage) {
        return;
      }

      appendCoryBubble(userMessage, 'user');
      coryInput.value = '';

      const typingBubble = appendCoryBubble('Thinking...', 'bot', true);
      window.setTimeout(() => {
        if (typingBubble) {
          typingBubble.remove();
        }
        appendCoryBubble(getCoryReply(userMessage), 'bot');
      }, 350);
    }

    function setPopupOpen(open) {
      if (!coryPopup) {
        return;
      }

      coryPopup.setAttribute('aria-hidden', open ? 'false' : 'true');
      if (open && coryInput) {
        coryInput.focus();
      }
    }

    if (coryToggle && coryPopup) {
      coryToggle.addEventListener('click', () => {
        const isOpen = coryPopup.getAttribute('aria-hidden') === 'false';
        setPopupOpen(!isOpen);
      });

      coryClose.addEventListener('click', () => {
        setPopupOpen(false);
      });

      document.addEventListener('click', (event) => {
        if (coryPopup.getAttribute('aria-hidden') === 'true') {
          return;
        }

        if (!coryPopup.contains(event.target) && !coryToggle.contains(event.target)) {
          setPopupOpen(false);
        }
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          setPopupOpen(false);
        }
      });
    }

    if (corySend && coryInput && coryBody) {
      corySend.addEventListener('click', handleCorySend);
      coryInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          handleCorySend();
        }
      });
    }
  </script>
</body>
</html>
