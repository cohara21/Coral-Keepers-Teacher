<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coral Keepers - Courses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #faf9f8;
      --text-dark: #2f3333;
      --text-muted: #5b605f;
      --blue: #0075de;
      --green: #2ecc71;
      --inactive: #989898;
      --card-border: rgba(0, 0, 0, 0.1);
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text-dark);
      font-family: "Inter", sans-serif;
    }

    html {
      overflow-y: scroll;
      scrollbar-gutter: stable;
    }

    body {
      overflow-x: hidden;
    }

    .top-nav {
      position: fixed;
      z-index: 30;
      left: 0;
      right: 0;
      top: 0;
      height: 64px;
      backdrop-filter: blur(6px);
      background: rgba(255, 255, 255, 0.95);
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      display: flex;
      justify-content: center;
    }

    .top-nav-inner {
      width: min(1328px, calc(100% - 48px));
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 100%;
    }

    .brand {
      width: 239px;
      height: 36.716px;
      display: block;
      object-fit: contain;
    }

    .nav-links {
      display: flex;
      gap: 4px;
      align-items: stretch;
      height: 48px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      line-height: 16px;
      border-bottom: 2px solid transparent;
      text-decoration: none;
    }

    .nav-link.active {
      color: var(--blue);
      font-weight: 700;
      border-bottom-color: var(--blue);
      padding-bottom: 2px;
    }

    .nav-link.switch {
      margin-left: auto;
      width: 190px;
      justify-content: flex-end;
      gap: 8px;
      padding-right: 16px;
    }

    .switch-icon {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      flex: none;
    }

    .learn-page {
      position: relative;
      padding-top: 65px;
      min-height: 100vh;
    }

    .learn-shell {
      position: relative;
      width: 1280px;
      height: 757.265px;
      margin: 0 auto;
    }

    .hero-banner {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      width: 100vw;
      height: 200px;
      min-height: 200px;
      max-height: 200px;
      overflow: hidden;
    }

    .hero-banner img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 200px;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .hero-avatar {
      position: absolute;
      left: 539px;
      top: 108px;
      width: 170px;
      height: 170px;
      z-index: 2;
    }

    .hero-avatar img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      border-radius: 50%;
    }

    .course-title {
      position: absolute;
      left: 0;
      right: 0;
      top: 316px;
      transform: translateY(-50%);
      margin: 0;
      text-align: center;
      color: #000000;
      font-size: 24px;
      line-height: 20.106px;
      font-weight: 500;
      white-space: nowrap;
    }

    .courses {
      position: absolute;
      left: 0;
      top: 352px;
      width: 1280px;
      height: 276.265px;
    }

    .course-card {
      position: absolute;
      width: 393.146px;
      height: 276.265px;
      background: #ffffff;
      border: 0.664px solid var(--card-border);
      border-radius: 5.313px;
      box-shadow: var(--shadow);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
    }

    a.course-card {
      cursor: pointer;
    }

    a.course-card:hover,
    a.course-card:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.35);
      filter: brightness(1.05);
    }

    a.course-card:active {
      transform: translateY(0);
    }

    .course-card:nth-child(1) {
      left: 32px;
    }

    .course-card:nth-child(2) {
      left: 443px;
    }

    .course-card:nth-child(3) {
      left: 854px;
    }

    .course-card-header {
      position: absolute;
      left: 15.94px;
      right: 15.94px;
      top: 15.94px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 2;
    }

    .course-code {
      color: var(--text-muted);
      font-size: 12px;
      line-height: 10.626px;
      font-weight: 700;
      letter-spacing: 0.7969px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .course-status {
      font-size: 12px;
      line-height: 10.626px;
      font-weight: 700;
      letter-spacing: 0.7969px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .course-status.active {
      color: var(--green);
    }

    .course-status.inactive {
      color: var(--inactive);
    }

    .course-image {
      position: absolute;
      left: -0.66px;
      top: 37.34px;
      width: 393px;
      height: 168px;
      overflow: hidden;
    }

    .course-image img {
      position: absolute;
      display: block;
      max-width: none;
      object-fit: cover;
    }

    .course-card:nth-child(1) .course-image img {
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .course-card:nth-child(2) .course-image img {
      left: 0;
      top: -42.02%;
      width: 136.98%;
      height: 213.73%;
    }

    .course-card:nth-child(3) .course-image {
      background: #d9d9d9;
    }

    .course-card:nth-child(3) .course-image img {
      left: 0;
      top: -37.46%;
      width: 100%;
      height: 175.45%;
    }

    .course-name {
      position: absolute;
      left: 16.34px;
      top: 242.34px;
      transform: translateY(-50%);
      margin: 0;
      color: var(--text-dark);
      font-size: 20px;
      line-height: 13.282px;
      font-weight: 500;
      white-space: nowrap;
    }

    .floating-ai {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 73px;
      height: 73px;
      border-radius: 46.063px;
      border: none;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
      z-index: 40;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
    }

    .floating-ai:hover,
    .floating-ai:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.35);
      filter: brightness(1.05);
    }

    .floating-ai:active {
      transform: translateY(0);
    }

    .floating-ai img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .cory-popup {
      position: fixed;
      right: 20px;
      bottom: 108px;
      width: 331px;
      height: 310px;
      background: #ffffff;
      overflow: visible;
      z-index: 45;
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
    }

    .cory-popup[aria-hidden="true"] {
      display: none;
    }

    .cory-header {
      height: 65px;
      background: #005eb4;
      position: relative;
    }

    .cory-avatar {
      position: absolute;
      left: 16px;
      top: 14px;
      width: 38px;
      height: 38px;
      border: 1.562px solid #0075de;
      border-radius: 23.978px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2.082px 2.082px rgba(0, 0, 0, 0.11);
      padding: 1.562px;
    }

    .cory-avatar img {
      width: 16.807px;
      height: 25.068px;
      display: block;
    }

    .cory-name {
      position: absolute;
      left: 66px;
      top: 25px;
      margin: 0;
      color: #ffffff;
      font-size: 13px;
      line-height: 16px;
      font-weight: 700;
    }

    .cory-close {
      position: absolute;
      right: 10px;
      top: 20px;
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: #ffffff;
      font-family: "Inter", sans-serif;
      font-size: 24px;
      line-height: 1;
      font-weight: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      cursor: pointer;
      z-index: 2;
    }

    .cory-pointer {
      position: absolute;
      right: 30px;
      bottom: -7px;
      width: 14px;
      height: 14px;
      background: #ffffff;
      transform: rotate(45deg);
      border-right: 1px solid rgba(0, 0, 0, 0.08);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      z-index: 1;
      pointer-events: none;
    }

    .cory-body {
      position: relative;
      height: 192px;
      background: #ffffff;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    .cory-bubble {
      width: fit-content;
      max-width: 254px;
      min-height: auto;
      border-radius: 10px;
      background: #f3f6ff;
      border: 1px solid #dbe7ff;
      display: flex;
      align-items: flex-start;
      padding: 10px 14px;
      align-self: flex-start;
    }

    .cory-bubble.user {
      background: #0075de;
      border-color: #0075de;
      align-self: flex-end;
    }

    .cory-bubble.typing {
      opacity: 0.85;
    }

    .cory-bubble p {
      margin: 0;
      font-size: 12px;
      line-height: 16px;
      color: #000000;
      font-weight: 400;
      white-space: normal;
    }

    .cory-bubble.user p {
      color: #ffffff;
    }

    .cory-input-row {
      height: 53px;
      border-top: 1px solid rgba(0, 0, 0, 0.05);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 13px 12px 12px;
      background: #ffffff;
    }

    .cory-input {
      flex: 1;
      height: 28px;
      border: none;
      border-radius: 2px;
      background: #f3f4f2;
      padding: 8px 12px 9px;
      font-family: "Inter", sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: #111827;
      outline: none;
    }

    .cory-input::placeholder {
      color: #6b7280;
      opacity: 1;
    }

    .cory-send {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 2px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      cursor: pointer;
    }

    .cory-send img {
      width: 14.25px;
      height: 12px;
      display: block;
    }
    }

    @media (max-width: 1280px) {
      .top-nav-inner {
        padding: 0 12px;
      }

      .learn-shell {
        width: 100%;
        height: auto;
        min-height: 900px;
      }

      .hero-banner {
        width: 100%;
      }

      .courses {
        position: relative;
        top: 352px;
        width: calc(100% - 24px);
        margin: 0 12px;
      }

      .course-card {
        position: relative;
        left: auto !important;
        top: auto;
        width: 100%;
        margin-bottom: 16px;
      }
    }

  
    .menu-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      z-index: 40;
    }
    .menu-toggle span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text-dark);
      border-radius: 2px;
      transition: 0.3s;
    }

    @media (max-width: 1000px) {
      .menu-toggle {
        display: flex;
      }
      .nav-links {
        display: flex;
        position: fixed;
        top: 64px;
        right: 0;
        width: 280px;
        height: calc(100vh - 64px);
        background: #ffffff;
        flex-direction: column;
        padding: 16px 24px;
        box-shadow: -10px 0 20px rgba(0,0,0,0.05);
        border-left: 1px solid rgba(0,0,0,0.08);
        gap: 0;
        z-index: 100;
        transform: translateX(100%);
        transition: transform 0.3s ease;
      }
      .nav-links.open {
        transform: translateX(0);
      }
      .nav-link {
        width: 100%;
        padding: 16px 0;
        border-bottom: 1px solid var(--divider);
        height: auto;
      }
      .nav-link.active {
        border-bottom-color: var(--blue);
      }
      .nav-link.switch {
        margin-left: 0;
        width: 100%;
        justify-content: flex-start;
        padding-right: 0;
        margin-top: auto;
        padding-bottom: 32px;
      }
      .menu-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
      .menu-toggle.open span:nth-child(2) { opacity: 0; }
      .menu-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    }

  </style>
</head>
<body>
  <header class="top-nav">
    <div class="top-nav-inner">
      <a class="brand-link" href="index.html" aria-label="Go to teacher home"><img class="brand" src="../assets/252d1942-dc4e-47ac-a946-f47357213f7a.svg" alt="Coral Keepers" /></a>
      
      <button class="menu-toggle" aria-label="Toggle menu" onclick="this.classList.toggle('open'); document.querySelector('.nav-links').classList.toggle('open')">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="nav-links" aria-label="Primary">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link active" href="course.html">Courses</a>
        <a class="nav-link" href="announcements.html">Announcements</a>
        <a class="nav-link" href="calendar.html">Calendar</a>
        <a class="nav-link" href="messages.html">Messages</a>
        <a class="nav-link switch" href="../Student/index.html">
          <span>Student View</span>
          <span class="switch-icon" aria-hidden="true">
            <img src="../assets/teacher-switch.svg" alt="" width="16" height="16" />
          </span>
        </a>
      </nav>
    </div>
  </header>

  <main class="learn-page">
    <section class="learn-shell">
      <div class="hero-banner">
        <img src="https://www.figma.com/api/mcp/asset/498c51dc-4280-4654-a2c1-692efdd39987" alt="Coral reef" />
      </div>

      <div class="hero-avatar">
        <img src="../assets/jeanneprofile.webp" alt="Professor Harran" />
      </div>

      <h1 class="course-title">Professor Harran's Courses</h1>

      <section class="courses" aria-label="Courses">
        <a class="course-card" href="course-details.html" aria-label="Introduction to Marine Biology">
          <div class="course-card-header">
            <span class="course-code">MAR BIO 101</span>
            <span class="course-status active">ACTIVE</span>
          </div>
          <div class="course-image">
            <img src="https://www.figma.com/api/mcp/asset/6752fed3-215b-49eb-91cb-38841e727be2" alt="Introduction to Marine Biology" />
          </div>
          <h2 class="course-name">Introduction to Marine Biology</h2>
        </a>

        <article class="course-card" aria-label="Exploring Marine Ecosystems">
          <div class="course-card-header">
            <span class="course-code">MAR BIO 201</span>
            <span class="course-status active">ACTIVE</span>
          </div>
          <div class="course-image">
            <img src="https://www.figma.com/api/mcp/asset/41efb633-5430-4520-9862-aafe7670bb26" alt="Exploring Marine Ecosystems" />
          </div>
          <h2 class="course-name">Exploring Marine Ecosystems</h2>
        </article>

        <article class="course-card" aria-label="Coral Science">
          <div class="course-card-header">
            <span class="course-code">MAR BIO 348</span>
            <span class="course-status inactive">INACTIVE</span>
          </div>
          <div class="course-image">
            <img src="https://www.figma.com/api/mcp/asset/0eddab46-40b3-4278-8f54-27bfe0491460" alt="Coral Science" />
          </div>
          <h2 class="course-name">Coral Science</h2>
        </article>
      </section>
    </section>
  </main>

  <button class="floating-ai" aria-label="Cory AI">
    <img src="../assets/corychaticon.svg" alt="" />
  </button>

  <div class="cory-popup" id="coryPopup" role="dialog" aria-label="Cory chat" aria-hidden="true">
    <div class="cory-pointer" aria-hidden="true"></div>
    <button class="cory-close" type="button" aria-label="Close Cory chat">×</button>
    <div class="cory-header">
      <div class="cory-avatar">
        <img src="../assets/9e494c12-c6a7-45f9-91ac-f474512b6048.svg" alt="" />
      </div>
      <p class="cory-name">Cory</p>
    </div>
    <div class="cory-body">
    </div>
    <div class="cory-input-row">
      <input class="cory-input" type="text" placeholder="Type a message..." />
      <button class="cory-send" type="button" aria-label="Send">
        <img src="../assets/bb543680-485a-4fa9-b5ed-481596dd53fd.svg" alt="" />
      </button>
    </div>
  </div>

  <script>
    function attachCoryChat() {
      const coryToggle = document.querySelector('.floating-ai, .cory-trigger');
      const coryPopup = document.getElementById('coryPopup');
      if (!coryToggle || !coryPopup) return;
      const coryBody = coryPopup.querySelector('.cory-body');
      const coryInput = coryPopup.querySelector('.cory-input');
      const corySend = coryPopup.querySelector('.cory-send');
      const coryClose = coryPopup.querySelector('.cory-close');
      const isTeacherView = window.location.pathname.includes('/Teacher/');
      const scrollCoryToLatest = () => { if (coryBody) coryBody.scrollTop = coryBody.scrollHeight; };
      const appendCoryBubble = (message, role = 'bot', isTyping = false) => {
        if (!coryBody) return null;
        const bubble = document.createElement('div');
        bubble.className = `cory-bubble${role === 'user' ? ' user' : ''}${isTyping ? ' typing' : ''}`;
        const text = document.createElement('p');
        text.textContent = message;
        bubble.appendChild(text);
        coryBody.appendChild(bubble);
        scrollCoryToLatest();
        return bubble;
      };
      const getCoryReply = (userMessage) => {
        const message = userMessage.toLowerCase();
        if (/(hi|hello|hey)/.test(message)) return 'Hey! I am Cory. Ask me about coral health, tank care, or where to find tools in this app.';
        if (message.includes('ph')) return 'For most reef tanks, pH is healthiest around 8.1 to 8.4. Big swings are more stressful than small day-to-day changes.';
        if (message.includes('temperature') || message.includes('temp')) return 'Coral systems usually do best around 76 to 80 degrees F. Keep temperature steady and avoid fast spikes.';
        if (message.includes('salinity')) return 'Target salinity near 35 ppt. Stability matters the most, so adjust slowly if you need to correct it.';
        if (message.includes('course') || message.includes('learn') || message.includes('assignment')) return isTeacherView ? 'In Teacher view, open Courses to manage lessons and due dates. Use Post Reading for reading prompts and follow-up tasks.' : 'In Student view, open Learn to check assignments and due dates, then track progress from your dashboard.';
        if (message.includes('calendar')) return 'Use the Calendar to switch between Month and Day views, then click a date in Day view to jump directly to that day.';
        return 'I can help with coral care or app navigation. Try asking about pH, salinity, temperature, Calendar, Messages, or Learn/Courses.';
      };
      const handleCorySend = () => {
        if (!coryInput) return;
        const userMessage = coryInput.value.trim();
        if (!userMessage) return;
        appendCoryBubble(userMessage, 'user');
        coryInput.value = '';
        const typingBubble = appendCoryBubble('Thinking...', 'bot', true);
        window.setTimeout(() => {
          if (typingBubble) typingBubble.remove();
          appendCoryBubble(getCoryReply(userMessage), 'bot');
        }, 350);
      };
      const setPopupOpen = (open) => {
        coryPopup.setAttribute('aria-hidden', open ? 'false' : 'true');
        if (open && coryInput) coryInput.focus();
      };
      coryToggle.addEventListener('click', () => { const isOpen = coryPopup.getAttribute('aria-hidden') === 'false'; setPopupOpen(!isOpen); });
      coryClose.addEventListener('click', () => {
        setPopupOpen(false);
      });
      document.addEventListener('click', (event) => {
        if (coryPopup.getAttribute('aria-hidden') === 'true') return;
        if (!coryPopup.contains(event.target) && !coryToggle.contains(event.target)) setPopupOpen(false);
      });
      document.addEventListener('keydown', (event) => { if (event.key === 'Escape') setPopupOpen(false); });
      if (corySend && coryInput && coryBody) {
        corySend.addEventListener('click', handleCorySend);
        coryInput.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') {
            event.preventDefault();
            handleCorySend();
          }
        });
      }
    }

    attachCoryChat();
  </script>
</body>
</html>
